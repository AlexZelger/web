<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Alex Zelger{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0e0e0e;
      --paper:  #f4f1eb;
      --muted:  #8a8680;
      --rule:   #d8d4cc;
      --accent: #1a3a2a;
      --gold:   #c9933a;
      --white:  #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main { flex: 1; }

    /* ── Masthead ─────────────────────────────────────────────────────── */
    .masthead {
      border-bottom: 2px solid var(--ink);
      padding: 0 40px;
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 100;
    }

    .masthead-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
    }

    .masthead-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(22px, 3vw, 32px);
      letter-spacing: -0.02em;
      color: var(--ink);
      text-decoration: none;
      padding: 20px 40px 20px 0;
      border-right: 1px solid var(--rule);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .masthead-name:hover { color: var(--accent); }

    .masthead-nav {
      display: flex;
      align-items: stretch;
      padding-left: 0;
    }

    .masthead-nav a {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 0 24px;
      display: flex;
      align-items: center;
      border-right: 1px solid var(--rule);
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .masthead-nav a:first-child { border-left: 1px solid var(--rule); margin-left: 40px; }
    .masthead-nav a:hover { color: var(--ink); background: rgba(0,0,0,0.02); }
    .masthead-nav a.active { color: var(--ink); font-weight: 500; }

    /* Mobile nav toggle */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 20px 0 20px 20px;
      flex-direction: column;
      gap: 5px;
      align-items: flex-end;
    }
    .nav-toggle span {
      display: block;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: width 0.2s;
    }
    .nav-toggle span:nth-child(1) { width: 24px; }
    .nav-toggle span:nth-child(2) { width: 16px; }
    .nav-toggle span:nth-child(3) { width: 20px; }

    .mobile-nav {
      display: none;
      flex-direction: column;
      border-top: 1px solid var(--rule);
      padding: 8px 0;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 14px 0;
      border-bottom: 1px solid var(--rule);
      transition: color 0.2s;
    }
    .mobile-nav a:last-child { border-bottom: none; }
    .mobile-nav a:hover, .mobile-nav a.active { color: var(--ink); }

    /* ── Footer ──────────────────────────────────────────────────────── */
    footer {
      border-top: 2px solid var(--ink);
      padding: 24px 40px;
      margin-top: auto;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--ink);
    }

    .footer-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--ink); }

    /* ── Shared utility classes ──────────────────────────────────────── */
    .tag {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--rule);
      color: var(--muted);
    }
    .tag.highlight {
      background: var(--accent);
      color: rgba(245,236,215,0.9);
      border-color: var(--accent);
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .masthead { padding: 0 20px; }
      .masthead-nav { display: none; }
      .nav-toggle { display: flex; }
      footer { padding: 20px; }
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Masthead ── -->
  <header class="masthead">
    <div class="masthead-inner">
      <a href="/" class="masthead-name">Alex Zelger</a>
      <nav class="masthead-nav">
        <a href="/"          class="{{ 'active' if request.path == '/' }}">Home</a>
        <a href="/portfolio" class="{{ 'active' if request.path == '/portfolio' }}">Projects</a>
          <a href="/mp/">Multiplayer</a>
        <a href="/about"     class="{{ 'active' if request.path == '/about' }}">About</a>
        <a href="mailto:AlexTZelger@gmail.com">Contact</a>
      </nav>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-nav" id="mobile-nav">
      <a href="/"          class="{{ 'active' if request.path == '/' }}">Home</a>
      <a href="/portfolio" class="{{ 'active' if request.path == '/portfolio' }}">Projects</a>
      <a href="/about"     class="{{ 'active' if request.path == '/about' }}">About</a>
        <a href="/mp/">Multiplayer</a>
      <a href="mailto:AlexTZelger@gmail.com">Contact</a>
    </div>
  </header>

  <!-- ── Page content ── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer>
    <div class="footer-inner">
      <span class="footer-name">Alex Zelger</span>
      <div class="footer-links">
        <a href="https://github.com/AlexZelger"    target="_blank" rel="noopener">GitHub</a>
        <a href="https://linkedin.com/in/Alex-Zelger" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:AlexTZelger@gmail.com">Email</a>
      </div>
    </div>
  </footer>

  <script>
    function toggleNav() {
      document.getElementById('mobile-nav').classList.toggle('open');
    }
    // Close mobile nav on outside click
    document.addEventListener('click', (e) => {
      const nav    = document.getElementById('mobile-nav');
      const toggle = document.querySelector('.nav-toggle');
      if (nav.classList.contains('open') && !nav.contains(e.target) && !toggle.contains(e.target)) {
        nav.classList.remove('open');
      }
    });
  </script>

  {% block scripts %}{% endblock %}

</body>
</html>
