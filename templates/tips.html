<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tips.css') }}">
</head>
<body>
  <div class="container">
    <h1>Tip Calculator</h1>

    <form id="tipForm" data-endpoint="{{ url_for('calculate_tips') }}">
      <div class="form-group">
        <label for="total">Bill Total ($)</label>
        <input id="total" type="number" step="0.01" required />
      </div>

      <div class="form-group">
        <label for="tip_percentage">Tip Percentage (%)</label>
        <input id="tip_percentage" type="number" step="1" required />
      </div>

      <div class="form-group">
        <label for="num_people">Number of People</label>
        <input id="num_people" type="number" step="1" min="1" required />
      </div>

      <button type="submit" class="btn">Calculate</button>
    </form>

    <div id="resultBox" class="result-box hidden"></div>
  </div>

  <!-- External JS -->
  <script src="{{ url_for('static', filename='tips.js') }}" defer></script>
</body>
</html>
