{% extends "base.html" %}

{% block title %}Race not found — Draft Order Randomizer{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto;padding:60px 20px;text-align:center;font-family:'IBM Plex Mono',monospace;">
  <div style="font-size:56px;margin-bottom:14px;">🏈</div>
  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:0.04em;margin-bottom:10px;">Race Not Found</h1>
  <p style="color:var(--muted);margin-bottom:26px;">
    This race code doesn't exist or has expired (races are kept for a few hours).
    Start a fresh one below.
  </p>
  <a href="/draft/" style="display:inline-block;background:#f2c14e;color:#0c2415;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;padding:12px 34px;border-radius:8px;text-decoration:none;">
    New Race →
  </a>
</div>
{% endblock %}
