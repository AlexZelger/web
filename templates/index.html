<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HR Distance Randomizer</title>

  <!-- Pixel font for retro look -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <!-- Top-right theme toggle -->
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
    <span id="themeIcon" aria-hidden="true">☀️</span>
  </button>

  <div class="app retro">
    <header class="retro-header">
      <h1>Home Run Distance Randomizer</h1>
      <p class="sub">Pick 6–12 players, name them (or randomize), then swing away.</p>
    </header>

    <!-- Retro Scoreboard -->
    <section class="scoreboard">
      <div class="sb-title bulb">HOMERUN&nbsp;DERBY</div>
      <div class="sb-grid">
        <div class="sb-cell bulb">AT&nbsp;BAT</div>
        <div class="sb-val"><span class="bulb" id="sbAtBat">—</span></div>

        <div class="sb-cell bulb">DIST</div>
        <div class="sb-val"><span class="bulb" id="sbDist">—</span></div>

        <div class="sb-cell bulb">PLAYERS</div>
        <div class="sb-val"><span class="bulb" id="sbPlayers">—</span></div>

        <div class="sb-cell bulb">LEADER</div>
        <div class="sb-val"><span class="bulb" id="sbLeader">—</span></div>
      </div>
      <div class="sb-footer">RUN&nbsp;<span class="bulb" id="sbRun">—</span></div>
    </section>

    <!-- Setup Menu -->
    <div id="menuOverlay" class="overlay">
      <div class="overlay-card" role="dialog" aria-labelledby="menuTitle" aria-modal="true">
        <h2 id="menuTitle">Lineup</h2>

        <div class="grid-row">
          <label for="playerCount">Players</label>
          <select id="playerCount" aria-label="Number of players">
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8" selected>8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
          </select>
        </div>

        <div class="names">
          <div class="names-head">
            <h3>Player names</h3>
            <button id="randomizeNamesBtn" type="button" class="btn-secondary">Randomize names</button>
          </div>
          <div id="namesContainer" class="names-grid"></div>
        </div>

        <div class="overlay-actions">
          <button id="startBtn" class="btn-primary">Start Simulation</button>
        </div>
      </div>
    </div>

    <main>
      <!-- Canvas card now styled as a retro panel -->
      <section class="panel canvas-card">
        <div class="canvas-header">
          <div class="actions">
            <button id="rerunBtn" class="btn-primary" title="Run again">Rerun</button>
            <button id="changeBtn" class="btn-secondary" title="Change players">Change players</button>
          </div>
        </div>

        <canvas id="field" width="900" height="300" aria-label="Baseball field animation"></canvas>

        <div class="legend">
          <span class="dot"></span> Ball flight &nbsp; | &nbsp;
          <span class="fence"></span> Fence at <span id="fenceFt">—</span> ft
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <div class="panel-title bulb">LEADERBOARD</div>
          <ol id="leaderboard" class="board"></ol>
        </section>

        <section class="panel">
          <div class="panel-title bulb">NOW&nbsp;HITTING</div>
          <div id="currentPlayer" class="current">
            <span class="board" id="currentPlayerText">—</span>
          </div>
          <div id="status" class="status">
            <span class="bulb" id="statusText">Ready</span>
          </div>
        </section>
      </aside>
    </main>

    <footer>
      <small>Made by Alex Zelger</small>
    </footer>
  </div>

  <script defer src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
